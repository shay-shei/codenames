<!doctype html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
</head>
<body>
    <form method="post" action="/setNickname">
        <div class="container">
            <div class="row">
                <div class="col-1"></div>
                <div class="col-10">
                    <h3>What should be your nickname?</h3>
                </div>
                <div class="col-1"></div>
            </div>
            <div class="row">
                <div class="col-1"></div>
                <div class="col-8">
                    <div class="form-group">
                        <input style="width: 100%;" type="text" id="nickname" name="nickname" placeholder="Enter nickname" class="form-control"></input>
                    </div>
                </div>
                <div class="col-2">
                    <input type="submit" value="send" class="btn btn-primary"></input>
                </div>
                <div class="col-1"></div>
            </div>
        </div>
    </form>
    <script>
        $( document ).ready(function () {
            $("#nickname").focus();
        });
    </script>
</body>
